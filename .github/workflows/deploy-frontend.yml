name: Frontend CI/CD

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: https://creative-collective-api.irinabalanel.com
        run: npm run build

      - name: Package dist
        run: tar -czf ../dist.tar.gz -C dist .

      - name: Configure SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          echo "${{ secrets.CADDY_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.CADDY_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy static files to Caddy
        run: |
          set -euo pipefail
          host="${{ secrets.CADDY_DEPLOY_HOST }}"
          user="${{ secrets.CADDY_DEPLOY_USER }}"
          target="/opt/caddy/www/irinabalanel/creative-collective"
          scp ../dist.tar.gz "${user}@${host}:/tmp/creative-collective-${GITHUB_SHA}.tar.gz"
          ssh "${user}@${host}" "
            set -euo pipefail
            tmp='${target}.new.${GITHUB_SHA}'
            rm -rf \"\$tmp\"
            mkdir -p \"\$tmp\"
            tar -xzf /tmp/creative-collective-${GITHUB_SHA}.tar.gz -C \"\$tmp\"
            rm -f /tmp/creative-collective-${GITHUB_SHA}.tar.gz
            rm -rf '${target}'
            mv \"\$tmp\" '${target}'
          "

      - name: Smoke test
        run: curl -fsS https://creative-collective.irinabalanel.com >/dev/null
