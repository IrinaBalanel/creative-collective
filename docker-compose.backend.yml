services:
  creative_collective_api:
    image: ${IMAGE:-creative-collective/backend:latest}
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 8002
      MONGO_URI: mongodb://root:${MONGO_ROOT_PASSWORD:-creative_collective_root_password}@mongo:27017/creative-collective?authSource=admin
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://creative-collective.irinabalanel.com,http://localhost:5173}
    ports:
      - "${APP_PORT:-8002}:8002"
    depends_on:
      mongo:
        condition: service_healthy
      mongo_seed:
        condition: service_completed_successfully
    networks:
      - creative_collective_backend

  mongo:
    image: mongo:4.4
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-creative_collective_root_password}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - creative_collective_backend

  mongo_seed:
    image: mongo:4.4
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/db/seed:/seed:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      for file in /seed/*.json; do
        collection=$$(basename "$$file" .json);
        mongoimport --host mongo --username root --password ${MONGO_ROOT_PASSWORD:-creative_collective_root_password} --authenticationDatabase admin --db creative-collective --collection "$$collection" --drop --jsonArray --file "$$file";
      done
    networks:
      - creative_collective_backend

volumes:
  mongo_data:

networks:
  creative_collective_backend:
    name: creative_collective_backend
