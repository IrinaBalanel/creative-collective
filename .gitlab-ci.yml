stages:
  - build
  - deploy

variables:
  BACKEND_IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE/backend"
  BACKEND_IMAGE_TAG: "$CI_COMMIT_SHA"
  FRONTEND_IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE/frontend"
  FRONTEND_IMAGE_TAG: "$CI_COMMIT_SHA"

build:backend-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context "$CI_PROJECT_DIR/backend" --dockerfile "$CI_PROJECT_DIR/backend/Dockerfile" --destination "$BACKEND_IMAGE_REPOSITORY:$BACKEND_IMAGE_TAG" --destination "$BACKEND_IMAGE_REPOSITORY:main"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:frontend-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context "$CI_PROJECT_DIR/frontend" --dockerfile "$CI_PROJECT_DIR/frontend/Dockerfile" --build-arg "VITE_API_URL=https://creative-collective-api.irinabalanel.com" --destination "$FRONTEND_IMAGE_REPOSITORY:$FRONTEND_IMAGE_TAG" --destination "$FRONTEND_IMAGE_REPOSITORY:main"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:backend:
  stage: deploy
  image: alpine:3.21
  before_script:
    - apk add --no-cache openssh-client
    - install -m 700 -d ~/.ssh
    - echo "$DEPLOY_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      set -euo pipefail
      deploy_user="${DEPLOY_USER:-root}"
      deploy_dir="/opt/creative-collective-api"
      cat > deploy.env <<ENV
      IMAGE=${BACKEND_IMAGE_REPOSITORY}:${BACKEND_IMAGE_TAG}
      APP_PORT=8002
      MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      JWT_SECRET_KEY=${JWT_SECRET_KEY}
      ALLOWED_ORIGINS=https://creative-collective.irinabalanel.com,http://localhost:5173
      ENV
      ssh "${deploy_user}@${DEPLOY_HOST}" "mkdir -p ${deploy_dir}/backend/db/seed"
      ssh "${deploy_user}@${DEPLOY_HOST}" "cat > ${deploy_dir}/docker-compose.backend.yml" < docker-compose.backend.yml
      ssh "${deploy_user}@${DEPLOY_HOST}" "cat > ${deploy_dir}/.env" < deploy.env
      for seed in backend/db/seed/*.json; do
        ssh "${deploy_user}@${DEPLOY_HOST}" "cat > ${deploy_dir}/$seed" < "$seed"
      done
      registry_password_b64="$(printf '%s' "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')"
      ssh "${deploy_user}@${DEPLOY_HOST}" "printf '%s' '${registry_password_b64}' | base64 -d | docker login '${CI_REGISTRY}' -u '${CI_REGISTRY_USER}' --password-stdin >/dev/null && cd ${deploy_dir} && docker compose -f docker-compose.backend.yml pull && docker compose -f docker-compose.backend.yml up -d --remove-orphans"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:frontend-static:
  stage: deploy
  image: node:20-alpine
  before_script:
    - apk add --no-cache openssh-client
    - install -m 700 -d ~/.ssh
    - echo "$CADDY_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$CADDY_DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - cd frontend
    - npm ci
    - VITE_API_URL=https://creative-collective-api.irinabalanel.com npm run build
    - tar -czf ../dist.tar.gz -C dist .
    - scp ../dist.tar.gz "${CADDY_DEPLOY_USER}@${CADDY_DEPLOY_HOST}:/tmp/creative-collective-${CI_COMMIT_SHA}.tar.gz"
    - |
      ssh "${CADDY_DEPLOY_USER}@${CADDY_DEPLOY_HOST}" "
        set -euo pipefail
        target=/opt/caddy/www/irinabalanel/creative-collective
        tmp=\"\${target}.new.${CI_COMMIT_SHA}\"
        rm -rf \"\$tmp\"
        mkdir -p \"\$tmp\"
        tar -xzf /tmp/creative-collective-${CI_COMMIT_SHA}.tar.gz -C \"\$tmp\"
        rm -f /tmp/creative-collective-${CI_COMMIT_SHA}.tar.gz
        rm -rf \"\$target\"
        mv \"\$tmp\" \"\$target\"
      "
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
