stages:
  - build
  - deploy

variables:
  BACKEND_IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE/backend"
  BACKEND_IMAGE_TAG: "$CI_COMMIT_SHA"
  FRONTEND_IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE/frontend"
  FRONTEND_IMAGE_TAG: "$CI_COMMIT_SHA"

build:backend-image:
  stage: build
  image: docker:27.5.1
  services:
    - docker:27.5.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -f backend/Dockerfile -t "$BACKEND_IMAGE_REPOSITORY:$BACKEND_IMAGE_TAG" -t "$BACKEND_IMAGE_REPOSITORY:main" ./backend
    - docker push "$BACKEND_IMAGE_REPOSITORY:$BACKEND_IMAGE_TAG"
    - docker push "$BACKEND_IMAGE_REPOSITORY:main"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:frontend-image:
  stage: build
  image: docker:27.5.1
  services:
    - docker:27.5.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -f frontend/Dockerfile --build-arg VITE_API_URL=https://creative-collective-api.irinabalanel.com -t "$FRONTEND_IMAGE_REPOSITORY:$FRONTEND_IMAGE_TAG" -t "$FRONTEND_IMAGE_REPOSITORY:main" ./frontend
    - docker push "$FRONTEND_IMAGE_REPOSITORY:$FRONTEND_IMAGE_TAG"
    - docker push "$FRONTEND_IMAGE_REPOSITORY:main"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:backend:
  stage: deploy
  image: alpine:3.21
  before_script:
    - apk add --no-cache openssh-client
    - install -m 700 -d ~/.ssh
    - echo "$PROXMOX_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$PROXMOX_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      set -euo pipefail
      cat > deploy.env <<ENV
      IMAGE=${BACKEND_IMAGE_REPOSITORY}:${BACKEND_IMAGE_TAG}
      APP_PORT=8002
      MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      JWT_SECRET_KEY=${JWT_SECRET_KEY}
      ALLOWED_ORIGINS=https://creative-collective.irinabalanel.com,http://localhost:5173
      ENV
      ssh "${PROXMOX_USER}@${PROXMOX_HOST}" "pct exec ${HOSTING_LXC_ID} -- mkdir -p /opt/creative-collective-api/backend/db/seed"
      ssh "${PROXMOX_USER}@${PROXMOX_HOST}" "pct exec ${HOSTING_LXC_ID} -- bash -lc 'cat > /opt/creative-collective-api/docker-compose.backend.yml'" < docker-compose.backend.yml
      ssh "${PROXMOX_USER}@${PROXMOX_HOST}" "pct exec ${HOSTING_LXC_ID} -- bash -lc 'cat > /opt/creative-collective-api/.env'" < deploy.env
      for seed in backend/db/seed/*.json; do
        ssh "${PROXMOX_USER}@${PROXMOX_HOST}" "pct exec ${HOSTING_LXC_ID} -- bash -lc 'cat > /opt/creative-collective-api/$seed'" < "$seed"
      done
      ssh "${PROXMOX_USER}@${PROXMOX_HOST}" "pct exec ${HOSTING_LXC_ID} -- bash -lc 'cd /opt/creative-collective-api && docker compose -f docker-compose.backend.yml pull && docker compose -f docker-compose.backend.yml up -d --remove-orphans'"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

deploy:frontend-static:
  stage: deploy
  image: node:20-alpine
  before_script:
    - apk add --no-cache openssh-client
    - install -m 700 -d ~/.ssh
    - echo "$CADDY_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$CADDY_DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - cd frontend
    - npm ci
    - VITE_API_URL=https://creative-collective-api.irinabalanel.com npm run build
    - tar -czf ../dist.tar.gz -C dist .
    - scp ../dist.tar.gz "${CADDY_DEPLOY_USER}@${CADDY_DEPLOY_HOST}:/tmp/creative-collective-${CI_COMMIT_SHA}.tar.gz"
    - |
      ssh "${CADDY_DEPLOY_USER}@${CADDY_DEPLOY_HOST}" "
        set -euo pipefail
        target=/opt/caddy/www/irinabalanel/creative-collective
        tmp=\"\${target}.new.${CI_COMMIT_SHA}\"
        rm -rf \"\$tmp\"
        mkdir -p \"\$tmp\"
        tar -xzf /tmp/creative-collective-${CI_COMMIT_SHA}.tar.gz -C \"\$tmp\"
        rm -f /tmp/creative-collective-${CI_COMMIT_SHA}.tar.gz
        rm -rf \"\$target\"
        mv \"\$tmp\" \"\$target\"
      "
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
